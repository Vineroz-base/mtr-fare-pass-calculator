<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MTR Fare Calculator (全月通)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>MTR Fare Calculator (全月通)</h1>

    <label for="fromStation">From Station:</label>
    <select id="fromStation"></select>

    <label for="toStation">To Station:</label>
    <select id="toStation"></select>

    <label for="passOption">Monthly Pass:</label>
    <select id="passOption">
      <option>No Pass</option>
      <option>Pass1: Sheung Shui/Wu Kai Sha ↔ East Tsim Sha Tsui</option>
      <option>Pass2: Tuen Mun ↔ Nam Cheong</option>
      <option>Pass3: Tuen Mun ↔ Hung Hom</option>
      <option>Pass4: Tung Chung ↔ Nam Cheong</option>
      <option>Pass5: Tung Chung ↔ Hong Kong</option>
    </select>

    <button onclick="calculateFare()">Calculate</button>

    <table id="resultTable" style="display:none;">
      <tr><td class="highlight">Fare with Pass:</td><td id="passFare"></td></tr>
      <tr><td>Original Fare:</td><td id="originalFare"></td></tr>
      <tr><td>Difference:</td><td id="difference"></td></tr>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
